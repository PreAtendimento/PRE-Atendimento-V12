kind = "web"
      previewPath = "/"
      title = "PRE-Atendimento V8"
      version = "1.0.0"
      id = "artifacts/main-app"
      router = "path"

      [[integratedSkills]]
      name = "react-vite"
      version = "1.0.0"

      [[services]]
      name = "web"
      paths = [ "/" ]
      localPort = 5000

      [services.development]
      run = "pnpm --filter @workspace/main-app run dev"

      [services.production]
      build = "pnpm --filter @workspace/main-app run build"
      serve = "static"

      [services.env]
      PORT = "5000"
      BASE_PATH = "/"

      [[services]]
      name = "api"
      paths = [ "/api", "/health" ]
      localPort = 5001

      [services.development]
      run = "cd /home/runner/workspace && pnpm run dev"

      [services.production]
      run = "cd /home/runner/workspace && pnpm run start"

      [services.env]
      PORT = "5001"
  